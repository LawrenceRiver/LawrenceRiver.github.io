<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Admin</title>
  </head>
  <body>
    <div id="oauth-debug" style="position:fixed;left:12px;bottom:12px;z-index:2147483647;font:12px/1.35 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;letter-spacing:0.2px;color:rgba(255,255,255,0.82);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);padding:8px 10px;border-radius:10px;max-width:min(560px,calc(100vw - 24px));white-space:pre-wrap;display:none"></div>
    <script>
      (function () {
        var el = document.getElementById('oauth-debug');
        if (!el) return;
        var last = window.localStorage.getItem('decap_oauth_last');
        if (last) {
          el.style.display = 'block';
          el.textContent = last;
        }
        window.addEventListener('message', function (event) {
          var isAuthString = typeof event.data === 'string' && event.data.indexOf('authorization:github:') === 0;
          var line = isAuthString
            ? ('OAuth message received\nfrom: ' + event.origin + '\nformat: authorization:github:<json>')
            : ('Message received\nfrom: ' + event.origin + '\ntype: ' + (typeof event.data));
          window.localStorage.setItem('decap_oauth_last', line);
          el.style.display = 'block';
          el.textContent = line;
        });
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
  </body>
</html>
